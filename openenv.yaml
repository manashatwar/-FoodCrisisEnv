name: FoodCrisisEnv
version: "1.0.0"
description: >
  FoodCrisisEnv is a deterministic OpenEnv benchmark for food safety outbreak
  response. Agents trace contaminated food through a directed supply chain
  graph under noisy sensors, delayed illness reports, limited lab tests,
  limited recall budget, and public-trust tradeoffs.

app: server.app:app
runtime: fastapi
port: 7860
inference: inference.py
action_type: string
observation_type: structured
reward: continuous
grader: deterministic
score_range: [0.0, 1.0]

tasks:
  - id: 1
    name: easy
    max_steps: 48
    description: >
      Single-source contamination tracing with low sensor noise, fast illness
      reports, and generous budgets.
  - id: 2
    name: medium
    max_steps: 60
    description: >
      Multi-source tracing with delayed reports, noisier sensors, and tighter
      lab and recall budgets.
  - id: 3
    name: hard
    max_steps: 72
    description: >
      Adversarial outbreak management with false sensor spikes, delayed
      illness reports, source re-seeding, and strong public-trust pressure.

metadata:
  display_name: "FoodCrisisEnv"
  package_name: "irce"
  package_dir: "src/irce"
  benchmark_focus: "food safety contamination tracing and containment"
  real_world_domain: "FDA-style supply chain outbreak response"
  deterministic: true
  llm_ready: true
  author: "FoodCrisisEnv Team"
  license: "MIT"
  compatibility_note: "Legacy compatibility action strings are mapped internally for inference compatibility."
